<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo A&D - Ventas y Suministros</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Catálogo A&D</h1>
            <p>Ventas y Suministros</p>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Filtros -->
            <div class="filtros">
                <input type="text" id="busqueda" placeholder="🔍 Buscar productos...">
                <select id="categoria">
                    <option value="">Todas las categorías</option>
                </select>
                <select id="ordenar">
                    <option value="nombre">Ordenar por nombre</option>
                    <option value="precio-asc">Precio menor a mayor</option>
                    <option value="precio-desc">Precio mayor a menor</option>
                </select>
            </div>

            <!-- Grid de productos -->
            <div id="productos" class="grid-productos">
                <!-- Los productos se cargarán aquí -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <!-- Sección de copyright -->
                <div class="footer-section">
                    <h3>Ventas y Suministros A&D</h3>
                    <p>&copy; 2026 Todos los derechos reservados.</p>
                </div>

                <!-- Sección de contacto -->
                <div class="footer-section">
                    <h3>📞 Contáctenos</h3>
                    <ul class="contacto-list">
                        <li>
                            <strong>📧 Email:</strong>
                            <a href="mailto:plazuelaventasysuministrosayd@gmail.com">
                                plazuelaventasysuministrosayd@gmail.com
                            </a>
                        </li>
                        <li>
                            <strong>📱 WhatsApp:</strong>
                            <a href="https://wa.me/34" target="_blank">
                                +34 XXX XXX XXX
                            </a>
                        </li>
                        <li>
                            <strong>📍 Ubicación:</strong>
                            <span>Tu ciudad, Tu país</span>
                        </li>
                    </ul>
                </div>

                <!-- Sección de redes sociales -->
                <div class="footer-section">
                    <h3>🌐 Síguenos</h3>
                    <div class="social-links">
                        <a href="#" class="social-icon">📘 Facebook</a>
                        <a href="#" class="social-icon">📷 Instagram</a>
                        <a href="#" class="social-icon">🐦 Twitter</a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="productos.js"></script>
    <script src="catalogo.js"></script>
</body>
</html>
